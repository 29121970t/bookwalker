services:
  frontend:
    build:
      context: ./frontend
      args:
        - SERVER_NAME=${SERVER_NAME}
        - BACKEND_URL=http://backend:8080
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  db:
    image: postgres:latest
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}"]
      interval: 3ms
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
     - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/books"]
      interval: 3ms
      timeout: 5s
      retries: 5
volumes:
  pgdata:

  
  