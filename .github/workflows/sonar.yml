name: SonarCloud

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    name: Build And Analyze
    runs-on: ubuntu-latest
    env:
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build tests and JaCoCo report
        run: mvn -B clean verify

      - name: Validate SonarCloud configuration
        run: |
          test -n "$SONAR_PROJECT_KEY" || { echo "SONAR_PROJECT_KEY repository variable is not set"; exit 1; }
          test -n "$SONAR_ORGANIZATION" || { echo "SONAR_ORGANIZATION repository variable is not set"; exit 1; }

      - name: SonarCloud Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar
          -Dsonar.projectKey=${SONAR_PROJECT_KEY}
          -Dsonar.organization=${SONAR_ORGANIZATION}
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.sources=src/main/java
          -Dsonar.tests=src/test/java
          -Dsonar.java.binaries=target/classes
          -Dsonar.java.test.binaries=target/test-classes
          -Dsonar.junit.reportPaths=target/surefire-reports
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
