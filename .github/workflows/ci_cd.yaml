name: CI/CD
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches:
      - main
jobs:
  build_frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    env:
      PORT: ${ vars.PORT }
      BACKEND_URL: ${vars.BACKEND_URL}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
      - name: Install depenencies
        run: cd frontend && npm i
      - name: Test Build
        run: cd frontend &&  npm run build

  scan_backend:
    name: Scan Backend
    runs-on: ubuntu-latest
    env:
      PORT: ${ vars.PORT }
      BACKEND_URL: ${vars.BACKEND_URL}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Checkstyle
        run: ./mvnw checkstyle:check
      - name: Jacoco Report
        run: ./mvnw jacoco:report
      - name: Sonar Scan
        run: >
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar
          -Dsonar.projectKey=${SONAR_PROJECT_KEY}
          -Dsonar.organization=${SONAR_ORGANIZATION}
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.sources=src/main/java
          -Dsonar.tests=src/test/java
          -Dsonar.junit.reportPaths=target/surefire-reports
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
          -Dsonar.coverage.exclusions=src/main/java/com/kruosant/bookwalker/aspect/**,src/main/java/com/kruosant/bookwalker/cashe/**,src/main/java/com/kruosant/bookwalker/config/**,src/main/java/com/kruosant/bookwalker/controllers/**,src/main/java/com/kruosant/bookwalker/domains/**,src/main/java/com/kruosant/bookwalker/dtos/**,src/main/java/com/kruosant/bookwalker/exceptions/**,src/main/java/com/kruosant/bookwalker/mappers/**,src/main/java/com/kruosant/bookwalker/repositories/**,src/main/java/com/kruosant/bookwalker/security/**,src/main/java/com/kruosant/bookwalker/BookwalkerApplication.java

  build_backend:
    needs: scan_backend
    name: Build Backend 
    runs-on: ubuntu-latest
    env:
      PORT: ${ vars.PORT }
      BACKEND_URL: ${vars.BACKEND_URL}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Build
        run: ./mvnw clean package -DskipTests


  test_backend:
    needs: build_backend
    name: Build Backend 
    runs-on: ubuntu-latest
    env:
      PORT: ${ vars.PORT }
      BACKEND_URL: ${vars.BACKEND_URL}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:          
      - name: Run Tests
        run: ./mvnw clean test

  deploy_frontend:
    permissions:
      deployments: write
    name: Deploy Frontend to Render
    runs-on: ubuntu-latest
    needs: [build_frontend, test_backend]
    steps:
      - uses: JorgeLNJunior/render-deploy@v1.5.0
        with:
          service_id: ${{ secrets.RENDER_FRONTEND_SERVICE_ID }}
          api_key: ${{ secrets.RENDER_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          wait_deploy: true
          github_deployment: true
          deployment_environment: 'production'

  deploy_backend:
    permissions:
      deployments: write
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: [build_frontend, test_backend]
    steps:
      - uses: JorgeLNJunior/render-deploy@v1.5.0
        with:
          service_id: ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
          api_key: ${{ secrets.RENDER_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          wait_deploy: true
          github_deployment: true
          deployment_environment: 'production'
  
  health_check:
    needs: [deploy_frontend, deploy_backend]
    name: Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Check the Frontend
        uses: jtalk/url-health-check-action@v5
        with:
          url: https://bookwalker-fontend.onrender.com
          follow-redirect: false
          max-attempts: 3
          retry-delay: 5s
      - name: Check the Backend
        uses: jtalk/url-health-check-action@v5
        with:
          url: https://bookwalker-backend.onrender.com/books
          follow-redirect: false
          max-attempts: 3
          retry-delay: 5s

      
      

  
      

