name: CI/CD

on:
  push:
    branches:
      - main
jobs:
  build_frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    env:
      PORT: ${ vars.PORT }
      BACKEND_URL: ${vars.BACKEND_URL}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
      - name: Install depenencies
        run: cd frontend && npm i
      - name: Test Build
        run: cd frontend &&  npm run build

  build_backend:
    name: Build, Test & Scan Backend 
    runs-on: ubuntu-latest
    env:
      PORT: ${ vars.PORT }
      BACKEND_URL: ${vars.BACKEND_URL}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build
        run: ./mvnw clean package -DskipTests
      - name: Test
        run: ./mvnw clean verify
      - name: Sonar Scan
        run: >
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar
          -Dsonar.projectKey=${SONAR_PROJECT_KEY}
          -Dsonar.organization=${SONAR_ORGANIZATION}
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.sources=src/main/java
          -Dsonar.tests=src/test/java
          -Dsonar.java.binaries=target/classes
          -Dsonar.java.test.binaries=target/test-classes
          -Dsonar.junit.reportPaths=target/surefire-reports
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
          -Dsonar.coverage.exclusions=src/main/java/com/kruosant/bookwalker/aspect/**,src/main/java/com/kruosant/bookwalker/cashe/**,src/main/java/com/kruosant/bookwalker/config/**,src/main/java/com/kruosant/bookwalker/controllers/**,src/main/java/com/kruosant/bookwalker/domains/**,src/main/java/com/kruosant/bookwalker/dtos/**,src/main/java/com/kruosant/bookwalker/exceptions/**,src/main/java/com/kruosant/bookwalker/mappers/**,src/main/java/com/kruosant/bookwalker/repositories/**,src/main/java/com/kruosant/bookwalker/security/**,src/main/java/com/kruosant/bookwalker/BookwalkerApplication.java


  
      

