spring.application.name=bookwalker

spring.datasource.url=jdbc:postgresql://${DB_HOSTNAME}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver



spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_batch_fetch_size=10
spring.data.web.pageable.page-serialization-mode=via-dto


#springdoc.api-docs.path=/api-docs
#springdoc.swagger-ui.path=/swagger-ui.html
#springdoc.swagger-ui.disable-swagger-default-url=true

app.jwt.secret=${JWT_SECRET:DTRUYSGfd7r7121279eyiu}
app.jwt.expiration=86400000
app.upload-dir=./uploads
app.cors.allowed-origin=${FRONTEND_ORIGIN:http://localhost:5173}
app.admin.enabled=${ADMIN_SEED_ENABLED:true}
app.admin.email=${ADMIN_EMAIL:admin@bookwalker.local}
app.admin.password=${ADMIN_PASSWORD:admin}
app.admin.name=${ADMIN_NAME:Admin}
app.admin.city=${ADMIN_CITY:}

server.port=${PORT}
